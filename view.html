<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - claw-news</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .header h1 {
            flex: 1;
            margin: 0;
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }
        .markdown-body {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .loading, .error {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error { color: #e74c3c; }
        /* 图片响应式 */
        .markdown-body img {
            max-width: 100%;
            height: auto;
        }
        /* 代码块 */
        .markdown-body pre {
            overflow-x: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← 返回</a>
        <h1 id="title">加载中...</h1>
    </div>
    <div class="container">
        <div id="content" class="markdown-body">
            <div class="loading">正在加载文章...</div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const GITHUB_USER = 'lyxuncle';
        const REPO = 'claw-news';
        
        // 从 URL 获取文件名
        const params = new URLSearchParams(window.location.search);
        const filename = params.get('file');
        
        if (!filename) {
            document.getElementById('content').innerHTML = '<div class="error">缺少文件参数</div>';
        } else {
            document.getElementById('title').textContent = filename.replace('.md', '');
            
            fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO}/main/articles/${filename}`)
                .then(response => {
                    if (!response.ok) throw new Error('文件不存在');
                    return response.text();
                })
                .then(markdown => {
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
                });
        }
    </script>
</body>
</html>
