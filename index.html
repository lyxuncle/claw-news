<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>claw-news</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 24px 16px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 8px 0 0; opacity: 0.7; font-size: 14px; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }
        .article-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .article-item {
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .article-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .article-item a {
            display: block;
            padding: 16px;
            text-decoration: none;
            color: inherit;
        }
        .article-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin: 0 0 8px;
        }
        .article-date {
            font-size: 13px;
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📰 claw-news</h1>
        <p>AI & 科技新闻汇总</p>
    </div>
    <div class="container">
        <div id="article-list" class="article-list">
            <div class="loading">加载中...</div>
        </div>
    </div>
    <script>
        // 你的 GitHub 用户名和仓库名
        const GITHUB_USER = 'lyxuncle';
        const REPO = 'claw-news';
        
        async function loadArticles() {
            const listEl = document.getElementById('article-list');
            
            try {
                // 从 articles 文件夹获取 .md 文件
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${REPO}/contents/articles/`
                );
                const data = await response.json();
                
                // 检查返回数据是否是数组
                if (!Array.isArray(data)) {
                    throw new Error(`API 返回格式错误: ${JSON.stringify(data)}`);
                }
                
                // 过滤出 .md 文件并排序
                const mdFiles = data
                    .filter(f => f.name.endsWith('.md'))
                    .sort((a, b) => b.name.localeCompare(a.name));
                
                if (mdFiles.length === 0) {
                    listEl.innerHTML = '<div class="loading">暂无文章</div>';
                    return;
                }
                
                // 生成文章列表
                const html = mdFiles.map(file => {
                    // 从文件名提取日期和标题
                    let title = file.name.replace('.md', '');
                    let date = '';
                    
                    // 检查是否是日期格式文件
                    if (/^\d{4}-\d{2}-\d{2}/.test(title)) {
                        const parts = title.split('-');
                        if (parts.length >= 3) {
                            date = `${parts[0]}年${parts[1]}月${parts[2]}日`;
                            // 尝试读取文件第一行作为标题
                        }
                    }
                    
                    return `
                        <li class="article-item">
                            <a href="view.html?file=${encodeURIComponent(file.name)}">
                                <div class="article-title">${title}</div>
                                <div class="article-date">${date || '查看详情 →'}</div>
                            </a>
                        </li>
                    `;
                }).join('');
                
                listEl.innerHTML = `<ul class="article-list">${html}</ul>`;
                
            } catch (error) {
                listEl.innerHTML = `<div class="loading">加载失败: ${error.message}</div>`;
            }
        }
        
        loadArticles();
    </script>
</body>
</html>
